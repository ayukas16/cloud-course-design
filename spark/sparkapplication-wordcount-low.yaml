apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: pyspark-wordcount-low
  namespace: default
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: swr.cn-north-4.myhuaweicloud.com/cloud-51/pyspark:v9
  imagePullPolicy: IfNotPresent
  mainApplicationFile: local:///opt/spark/work/wordcount.py
  sparkVersion: "3.4.0"
  sparkConf:
    "spark.kubernetes.driver.request.cores": "200m"
    "spark.kubernetes.executor.request.cores": "200m"
    "spark.driver.memoryOverhead": "128m"
    "spark.executor.memoryOverhead": "128m"
  restartPolicy:
    type: Never
  driver:
    cores: 1
    coreLimit: "500m"
    memory: "512m"
    serviceAccount: spark
  executor:
    cores: 1
    coreLimit: "500m"
    instances: 1
    memory: "512m"