apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: pyspark-analysis-2exec
  namespace: default
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: swr.cn-north-4.myhuaweicloud.com/cloud-51/pyspark-analysis:v4
  imagePullPolicy: Always
  mainApplicationFile: local:///opt/spark/work/analysis.py
  sparkVersion: "3.4.0"

  sparkConf:
    "spark.kubernetes.driver.request.cores": "200m"
    "spark.kubernetes.executor.request.cores": "100m"
    "spark.driver.memoryOverhead": "128m"
    "spark.executor.memoryOverhead": "128m"
    "spark.sql.shuffle.partitions": "4"

  restartPolicy:
    type: Never

  driver:
    cores: 1
    coreLimit: "500m"
    memory: "512m"
    serviceAccount: spark

  executor:
    cores: 1
    coreLimit: "300m"
    instances: 2
    memory: "512m"