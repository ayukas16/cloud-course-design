apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: swr.cn-north-4.myhuaweicloud.com/cloud-51/frontend:v1
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "20m"
            memory: "32Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
        volumeMounts:
        - name: nginx-config-volume
          mountPath: /etc/nginx/conf.d
      volumes:
      - name: nginx-config-volume
        configMap:
          name: nginx-config